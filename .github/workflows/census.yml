name: Census

# Three-brand parallel census (HPCL, IOCL, BPCL) → geohash-sharded
# all-pumps dataset published to dataset/ and committed back to the repo.
#
# Schedule:
#   Every 3 days at 02:07 UTC — stations older than 3 days are re-scraped,
#   so freshness never exceeds ~3 days (well within the 14-day stale threshold
#   used by E0-Finder's frontend).
#
# Partial-failure tolerant: if a brand fails, the publish job still runs for
# the brands that succeeded. A GitHub issue is auto-filed for failed brands.
#
# WAF note: IOCL cap is concurrency 12 (proven safe from both residential
# and GH Actions datacenter IPs — see docs/research/iocl-waf-calibration.md
# in the E0-Finder repo for the full calibration history). If IOCL failures
# persist across multiple runs, drop concurrency to 10 before investigating.

on:
  schedule:
    - cron: '7 2 */3 * *'   # every 3 days at 02:07 UTC
  workflow_dispatch:
    inputs:
      brands:
        description: 'Brands to census — comma-separated subset of: hpcl,iocl,bpcl'
        required: false
        default: 'hpcl,iocl,bpcl'
      hpcl_limit:
        description: 'Max HPCL outlets this run (empty = no limit)'
        required: false
        default: ''
      iocl_limit:
        description: 'Max IOCL outlets this run (empty = no limit). Start small for WAF calibration.'
        required: false
        default: ''
      bpcl_limit:
        description: 'Max BPCL outlets this run (empty = no limit)'
        required: false
        default: ''
      concurrency:
        description: 'Concurrent lanes per brand (default 10; use ≤5 for IOCL WAF calibration)'
        required: false
        default: '10'
      publish_dataset:
        description: 'Commit dataset/ after census? Set false for calibration/dry runs.'
        required: false
        default: 'true'

# Prevent overlapping runs — a schedule-triggered run queues behind an
# in-progress one instead of running concurrently and racing on the commit.
concurrency:
  group: census-${{ github.ref }}
  cancel-in-progress: false

# Needed for creating issues (alerting) and releases + pushing commits.
permissions:
  contents: write
  issues: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # HPCL
  # ════════════════════════════════════════════════════════════════════════════
  census-hpcl:
    name: Census — HPCL
    runs-on: ubuntu-latest
    # HPCL at concurrency 12 ≈ 94 min (live-verified). 6h cap for safety.
    timeout-minutes: 360
    if: >-
      github.event_name == 'schedule' ||
      contains(inputs.brands, 'hpcl')

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Restore the most recent worklog so this run resumes instead of
      # restarting from scratch. Cache miss on the first ever run is harmless
      # (runProvider just starts fresh).
      - name: Restore HPCL worklog
        uses: actions/cache/restore@v6
        with:
          path: output/hpcl-worklog.jsonl
          key: worklog-hpcl-${{ github.run_id }}
          restore-keys: worklog-hpcl-

      - name: Run HPCL census
        env:
          HPCL_CENSUS_CONCURRENCY: ${{ inputs.concurrency || '12' }}
          HPCL_CENSUS_LIMIT: ${{ inputs.hpcl_limit }}
          HPCL_CENSUS_MAX_AGE_DAYS: '3'
        run: npm run census:hpcl

      - name: Compress HPCL raw output
        if: always()
        run: gzip -f output/hpcl-raw.jsonl

      # Save the worklog even if the census job failed/was killed so the NEXT
      # run can resume from where this one left off.
      - name: Save HPCL worklog
        if: always()
        uses: actions/cache/save@v6
        with:
          path: output/hpcl-worklog.jsonl
          key: worklog-hpcl-${{ github.run_id }}

      - name: Upload HPCL raw output
        uses: actions/upload-artifact@v7
        with:
          name: hpcl-raw
          path: output/hpcl-raw.jsonl.gz
          retention-days: 2
          if-no-files-found: warn

  # ════════════════════════════════════════════════════════════════════════════
  # IOCL
  # ════════════════════════════════════════════════════════════════════════════
  census-iocl:
    name: Census — IOCL
    runs-on: ubuntu-latest
    # IOCL at concurrency 12 ≈ 3.5h from a residential IP. Datacenter IPs
    # calibrated at concurrency 10 with zero blocks → bumped to 12.
    timeout-minutes: 360
    if: >-
      github.event_name == 'schedule' ||
      contains(inputs.brands, 'iocl')

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Restore IOCL worklog
        uses: actions/cache/restore@v6
        with:
          path: output/iocl-worklog.jsonl
          key: worklog-iocl-${{ github.run_id }}
          restore-keys: worklog-iocl-

      - name: Run IOCL census
        env:
          IOCL_CENSUS_CONCURRENCY: ${{ inputs.concurrency || '12' }}
          IOCL_CENSUS_LIMIT: ${{ inputs.iocl_limit }}
          IOCL_CENSUS_MAX_AGE_DAYS: '3'
        run: npm run census:iocl

      - name: Compress IOCL raw output
        if: always()
        run: gzip -f output/iocl-raw.jsonl

      - name: Save IOCL worklog
        if: always()
        uses: actions/cache/save@v6
        with:
          path: output/iocl-worklog.jsonl
          key: worklog-iocl-${{ github.run_id }}

      - name: Upload IOCL raw output
        uses: actions/upload-artifact@v7
        with:
          name: iocl-raw
          path: output/iocl-raw.jsonl.gz
          retention-days: 2
          if-no-files-found: warn

  # ════════════════════════════════════════════════════════════════════════════
  # BPCL
  # ════════════════════════════════════════════════════════════════════════════
  census-bpcl:
    name: Census — BPCL
    runs-on: ubuntu-latest
    # BPCL requires a residential IP — api.cep.bpcl.in blocks datacenter IPs.
    # We route through a Tailscale exit node (Raspberry Pi at a residential
    # location). If TAILSCALE_AUTH_KEY is not set, this job is skipped and the
    # publish step uses the last committed bpcl-raw.jsonl.gz instead.
    # ~25 min at concurrency 10 from a residential IP.
    timeout-minutes: 90
    if: >-
      (github.event_name == 'schedule' || contains(inputs.brands, 'bpcl')) &&
      vars.TAILSCALE_EXIT_NODE != ''

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Connect to Tailscale (residential IP via exit node)
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: --exit-node=${{ vars.TAILSCALE_EXIT_NODE }} --exit-node-allow-lan-access=false

      - name: Verify exit node (traffic now routes through residential IP)
        run: |
          echo "Tailscale connected. Public IP: $(curl -s https://api.ipify.org)"
          echo "Exit node: ${{ vars.TAILSCALE_EXIT_NODE }}"

      - name: Restore BPCL worklog
        uses: actions/cache/restore@v6
        with:
          path: output/bpcl-worklog.jsonl
          key: worklog-bpcl-${{ github.run_id }}
          restore-keys: worklog-bpcl-

      - name: Run BPCL census
        env:
          BPCL_CENSUS_CONCURRENCY: ${{ inputs.concurrency || '10' }}
          BPCL_CENSUS_LIMIT: ${{ inputs.bpcl_limit }}
          BPCL_CENSUS_MAX_AGE_DAYS: '3'
        run: npm run census:bpcl

      - name: Compress BPCL raw output
        if: always()
        run: gzip -f output/bpcl-raw.jsonl

      - name: Save BPCL worklog
        if: always()
        uses: actions/cache/save@v6
        with:
          path: output/bpcl-worklog.jsonl
          key: worklog-bpcl-${{ github.run_id }}

      - name: Upload BPCL raw output
        uses: actions/upload-artifact@v7
        with:
          name: bpcl-raw
          path: output/bpcl-raw.jsonl.gz
          retention-days: 2
          if-no-files-found: warn

  # ════════════════════════════════════════════════════════════════════════════
  # Publish — merges raw outputs, builds geohash-sharded dataset, commits,
  # and creates a GitHub Release with a human-readable diff.
  # ════════════════════════════════════════════════════════════════════════════
  publish:
    name: Publish dataset
    needs: [census-hpcl, census-iocl, census-bpcl]
    runs-on: ubuntu-latest
    # Allow publish even when some census jobs failed or are skipped (BPCL may
    # be skipped when Tailscale isn't configured yet — the publish job uses the
    # last committed bpcl-raw.jsonl.gz instead). Skip only when NO brand
    # succeeded.
    if: >-
      always() &&
      (needs.census-hpcl.result == 'success' || needs.census-hpcl.result == 'failure') &&
      (needs.census-iocl.result == 'success' || needs.census-iocl.result == 'failure') &&
      (needs.census-bpcl.result == 'success' || needs.census-bpcl.result == 'failure' || needs.census-bpcl.result == 'skipped') &&
      (needs.census-hpcl.result == 'success' || needs.census-iocl.result == 'success' || needs.census-bpcl.result == 'success')

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Download whichever brand artifacts were uploaded (missing ones are
      # silently skipped — single-brand calibration runs only produce one file).
      - name: Download raw outputs
        uses: actions/download-artifact@v7
        with:
          path: output/
          pattern: '*-raw'
          merge-multiple: true

      # ── Staleness check: for any brand that was skipped or failed, inspect
      # the last committed raw file. If it's older than STALE_AFTER_DAYS
      # (matching the scraper's maxAgeDays cadence), flag it so the summary
      # and release notes carry a visible warning.
      - name: Check data freshness
        id: freshness
        run: |
          STALE_AFTER_DAYS=3
          echo "STALE_AFTER_DAYS=$STALE_AFTER_DAYS" >> "$GITHUB_ENV"

          for brand in hpcl iocl bpcl; do
            FILE="output/${brand}-raw.jsonl.gz"
            if [ ! -f "$FILE" ]; then
              echo "${brand}_stale=true" >> "$GITHUB_OUTPUT"
              echo "${brand}_age=N/A" >> "$GITHUB_OUTPUT"
              continue
            fi
            FILE_AGE_DAYS=$(( ($(date +%s) - $(stat -c %Y "$FILE")) / 86400 ))
            echo "${brand}_age=${FILE_AGE_DAYS}d" >> "$GITHUB_OUTPUT"
            if [ "$FILE_AGE_DAYS" -gt "$STALE_AFTER_DAYS" ]; then
              echo "${brand}_stale=true" >> "$GITHUB_OUTPUT"
            else
              echo "${brand}_stale=false" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Build geohash-sharded dataset
        id: build
        run: npm run build-dataset

      # ── Job summary (always visible in the Actions UI) ──
      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Census — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "| Brand | Census | Raw lines | Data age |"
            echo "|-------|--------|----------:|----------|"
            echo "| HPCL  | ${{ needs.census-hpcl.result }} | $(zcat output/hpcl-raw.jsonl.gz 2>/dev/null | wc -l || echo 0) | ${{ steps.freshness.outputs.hpcl_age }} |"
            echo "| IOCL  | ${{ needs.census-iocl.result }} | $(zcat output/iocl-raw.jsonl.gz 2>/dev/null | wc -l || echo 0) | ${{ steps.freshness.outputs.iocl_age }} |"
            echo "| BPCL  | ${{ needs.census-bpcl.result }} | $(zcat output/bpcl-raw.jsonl.gz 2>/dev/null | wc -l || echo 0) | ${{ steps.freshness.outputs.bpcl_age }} |"
            echo ""

            # Emit staleness warnings
            STALE=""
            [ "${{ steps.freshness.outputs.hpcl_stale }}" = "true" ] && STALE="$STALE HPCL"
            [ "${{ steps.freshness.outputs.iocl_stale }}" = "true" ] && STALE="$STALE IOCL"
            [ "${{ steps.freshness.outputs.bpcl_stale }}" = "true" ] && STALE="$STALE BPCL"
            if [ -n "$STALE" ]; then
              echo "> ⚠️ **Stale data used:**$STALE — the scraper hasn't refreshed these brands within the ${STALE_AFTER_DAYS}-day window. The published dataset uses the last committed raw data. This will age further with each daily E0-Finder deploy until the next successful scrape."
              echo ""
            fi

            if [ -f dataset/index.json ]; then
              echo "### Published dataset"
              echo ""
              TOTAL=$(python3 -c "import json,sys; d=json.load(open('dataset/index.json')); print(d.get('totalOutlets','?'))" 2>/dev/null || echo "?")
              SHARDS=$(python3 -c "import json,sys; d=json.load(open('dataset/index.json')); print(len(d.get('shards',[])))" 2>/dev/null || echo "?")
              echo "- **${TOTAL}** outlets — **${SHARDS}** shards"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Commit (schedule or explicit publish_dataset=true) ──
      - name: Commit and push dataset
        id: commit
        if: >-
          github.event_name == 'schedule' ||
          inputs.publish_dataset == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # output/ is gitignored — force-add the raw JSONL so they persist
          # across runs and the next scheduled run has a complete baseline.
          for f in output/hpcl-raw.jsonl.gz output/iocl-raw.jsonl.gz output/bpcl-raw.jsonl.gz; do
            if [ -f "$f" ]; then git add -f "$f"; fi
          done

          git add dataset/

          if git diff --cached --quiet && git diff --quiet; then
            echo "Dataset unchanged — nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(dataset): census update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── GitHub Release (only when new data was committed) ──
      - name: Create GitHub Release
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="dataset-$(date -u +%Y%m%dT%H%M%SZ)"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Dataset update — $(date -u +%Y-%m-%d)" \
            --notes-file dataset/release-notes.md \
            --target "${{ github.sha }}"

  # ════════════════════════════════════════════════════════════════════════════
  # Alert — files a GitHub issue when any brand fails (one issue per run).
  # If an open issue already exists for this failure, adds a comment instead
  # of creating a duplicate.
  # ════════════════════════════════════════════════════════════════════════════
  notify:
    name: Alert on failure
    needs: [census-hpcl, census-iocl, census-bpcl]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      (needs.census-hpcl.result == 'failure' ||
       needs.census-iocl.result == 'failure' ||
       needs.census-bpcl.result == 'failure')
    permissions:
      issues: write

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const failed = [];
            if ('${{ needs.census-hpcl.result }}' === 'failure') failed.push('HPCL');
            if ('${{ needs.census-iocl.result }}' === 'failure') failed.push('IOCL');
            if ('${{ needs.census-bpcl.result }}' === 'failure') failed.push('BPCL');

            const title = `Census failure — ${failed.join(', ')} — ${new Date().toISOString().slice(0, 10)}`;

            // Check for an existing open issue with the same prefix to avoid duplicates.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'census-failure',
            });
            const duplicate = existing.find(i => i.title.startsWith('Census failure —'));
            if (duplicate) {
              // Add a comment noting the retry instead of filing a new issue.
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `Still failing on re-run: [run ${context.runId}](${runUrl})

            **Failed brands:** ${failed.join(', ')}

            The next scheduled run (every 3 days) will retry automatically. If this persists beyond 3 consecutive runs, check:
            - WAF blocks (IOCL — \`locator.iocl.com\`) — back concurrency down to 10
            - OAuth expiry (BPCL — token refresh may be needed)
            - DNS / network changes affecting the GH Actions datacenter IP range`,
              });
              console.log(`Added comment to existing issue #${duplicate.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `**Failed brands:** ${failed.join(', ')}

            **Run:** ${runUrl}

            The next scheduled run (every 3 days) will retry automatically. If failures persist across multiple runs, check:
            - WAF blocks (IOCL — \`locator.iocl.com\`) — back concurrency down to 10
            - OAuth expiry (BPCL — token refresh may be needed)
            - DNS / network changes affecting the GH Actions datacenter IP range`,
                labels: ['census-failure'],
              });
              console.log(`Created issue: ${title}`);
            }
